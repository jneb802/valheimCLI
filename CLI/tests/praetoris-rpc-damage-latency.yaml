name: Praetoris RPC Damage Latency
description: Generate a burst of RPC_Damage messages, report client send timing, and optionally verify server JSONL rows.

game:
  launch: true
  launchTimeout: 360s
  stopAfter: false

settings:
  timeout: 600s
  stopOnFailure: true

variables:
  character: RpcDamageLatency
  server: "178.156.172.16:2456"
  password: "warpalicious"
  damage_count: "30"
  expected_server_rpc_damage_count: "30"

tests:
  - name: Wait for Main Menu
    waitFor:
      state: MainMenu
      timeout: 360s
      message: Waiting for Valheim to reach the main menu...

  - name: Create Fresh Local Character
    commands:
      - cli_create_character ${character} --replace --local
    expect:
      output: 'contains "OK: Created and selected character"'
    wait: 1s

  - name: Join Hetzner Telemetry Server
    commands:
      - cli_connect_direct ${server} ${password}
    expect:
      output: 'contains "OK: Dedicated server join started"'
    wait: 1s

  - name: Wait for Server World
    waitFor:
      state: InWorld
      timeout: 360s
      message: Waiting for the client to enter the Hetzner server world...

  - name: Settle After Spawn
    wait: 15s

  - name: Enable Test Commands
    commands:
      - devcommands
      - god
      - ghost
      - heal
    wait: 1s

  - name: Spawn Damage Target
    commands:
      - spawn Greydwarf 1 1 3
    wait: 2s

  - name: Send RPC Damage Burst
    commands:
      - cli_rpc_damage_burst_nearest_character Greydwarf 1 50 ${damage_count}
    expect:
      output: 'matches "OK: Sent RPC_Damage burst count=${damage_count}.*avgMs=[0-9.]+.*maxMs=[0-9.]+"'
    wait: 8s

  - name: Verify Server RPC Damage Events
    commands:
      - |
        local: ssh warp@praetoris "python3 - <<'PY'
        import json
        import pathlib
        import sys

        character = '${character}'
        expected = int('${expected_server_rpc_damage_count}')
        root = pathlib.Path('/home/warp/valheim/mmcli-profiles/valheim-events-server/config/ValheimEvents')
        files = sorted(root.glob('events-*.jsonl'), key=lambda p: p.stat().st_mtime, reverse=True)[:4]
        count = 0
        sizes = []
        for path in files:
            with path.open(errors='ignore') as handle:
                for line in handle:
                    if character not in line or 'RPC_Damage' not in line:
                        continue
                    try:
                        event = json.loads(line)
                    except Exception:
                        continue
                    if event.get('eventType') == 'rpc_handled' and event.get('method') == 'RPC_Damage':
                        count += 1
                        sizes.append(len(line.encode('utf-8')))

        avg_size = sum(sizes) / len(sizes) if sizes else 0
        max_size = max(sizes) if sizes else 0
        print(f'rpcDamageCount={count} expected={expected} avgBytes={avg_size:.1f} maxBytes={max_size}')
        sys.exit(0 if count >= expected else 1)
        PY"
    expect:
      output: 'contains "localExitCode=0"'

  - name: Clean Enemy Evidence
    commands:
      - forcedelete 30 Greydwarf
    wait: 1s

cleanup:
  - forcedelete 30 Greydwarf
  - removedrops
  - ghost
  - god
