name: Valkyrie Season 6 Repro
description: Create a fresh character, join the Praetoris Hetzner test server, and verify the first-spawn intro state clears.

game:
  launch: true
  launchTimeout: 240s
  stopAfter: false

settings:
  timeout: 360s
  stopOnFailure: true

variables:
  character: ValkS6Repro
  server: "178.156.172.16:2456"
  password: warpalicious

tests:
  - name: Wait for Main Menu
    waitFor:
      state: MainMenu
      timeout: 240s
      message: Waiting for Valheim to reach the main menu...

  - name: Create Fresh Local Character
    commands:
      - cli_create_character ${character} --replace --local
    expect:
      output: 'contains "OK: Created and selected character"'
    wait: 1s

  - name: Join Hetzner Test Server
    commands:
      - cli_connect_direct ${server} ${password}
    expect:
      output: 'contains "OK: Dedicated server join started"'
    wait: 1s

  - name: Wait for Server World
    waitFor:
      state: InWorld
      timeout: 360s
      message: Waiting for the new character to enter the server world...

  - name: Wait for Valkyrie Intro Cleanup
    wait: 45s

  - name: Verify Intro State Cleared
    commands:
      - cli_check_intro_complete
    repeat: 6
    wait: 10s
    expect:
      output: 'contains "OK: Intro complete"'

  - name: Save Cleared Character Profile
    commands:
      - save
    wait: 3s
