name: Bird Drop Manual Repro
description: Create the Testing character, let the first Valkyrie intro play normally, pick a dandelion, set Eikthyr power, select a Deathlink choice, walk briefly, and watch for the carried/drop/death signal.

game:
  launch: true
  launchTimeout: 240s
  stopAfter: true

settings:
  timeout: 600s
  stopOnFailure: true

variables:
  character: Testing
  server: "178.156.172.16:2456"
  password: warpalicious
  deathlinkChoice: Vanilla

tests:
  - name: Wait for Main Menu
    waitFor:
      state: MainMenu
      timeout: 240s
      message: Waiting for Valheim to reach the main menu...

  - name: Create Fresh Local Character
    commands:
      - cli_create_character ${character} --replace --local
    expect:
      output: 'contains "OK: Created and selected character"'
    wait: 1s

  - name: Join Hetzner Test Server
    commands:
      - cli_connect_direct ${server} ${password}
    expect:
      output: 'contains "OK: Dedicated server join started"'
    wait: 1s

  - name: Wait for Server World
    waitFor:
      state: InWorld
      timeout: 360s
      message: Waiting for the new character to enter the server world...

  - name: Let Valkyrie Intro Play
    wait: 45s

  - name: Verify Landed From Intro
    commands:
      - cli_check_intro_complete
    repeat: 6
    wait: 10s
    expect:
      output: 'contains "OK: Intro complete"'

  - name: Pick Dandelion
    commands:
      - cli_pick_nearest Dandelion 120
    expect:
      output: 'contains "OK: Picked"'
    wait: 3s

  - name: Set Eikthyr Power
    commands:
      - cli_set_guardian_power GP_Eikthyr
    expect:
      output: 'contains "OK: Guardian power set"'
    wait: 1s

  - name: Select Deathlink Choice
    commands:
      - cli_set_deathlink_choice ${deathlinkChoice}
    expect:
      output: 'contains "OK: Deathlink choice set"'
    wait: 1s

  - name: Walk Around Briefly
    commands:
      - cli_walk 10
    expect:
      output: 'contains "OK: Walking forward"'
    wait: 12s

  - name: Watch for Bird Drop Signal
    commands:
      - cli_check_bird_drop
    repeat: 90
    wait: 1s
    expect:
      output: 'contains "OK: Bird drop signal detected"'
