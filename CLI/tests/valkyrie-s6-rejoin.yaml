name: Valkyrie Season 6 Rejoin Check
description: Rejoin the Praetoris Hetzner test server with the existing ValkS6Repro character and verify the Valkyrie intro does not restart.

game:
  launch: true
  launchTimeout: 240s
  stopAfter: false

settings:
  timeout: 360s
  stopOnFailure: true

variables:
  character: ValkS6Repro
  server: "178.156.172.16:2456"
  password: warpalicious

tests:
  - name: Wait for Main Menu
    waitFor:
      state: MainMenu
      timeout: 240s
      message: Waiting for Valheim to reach the main menu...

  - name: Select Existing Character
    commands:
      - cli_select_character ${character}
    expect:
      output: 'contains "OK: Selected character"'
    wait: 1s

  - name: Join Hetzner Test Server
    commands:
      - cli_connect_direct ${server} ${password}
    expect:
      output: 'contains "OK: Dedicated server join started"'
    wait: 1s

  - name: Wait for Server World
    waitFor:
      state: InWorld
      timeout: 360s
      message: Waiting for the existing character to enter the server world...

  - name: Verify Intro Does Not Restart
    commands:
      - cli_check_intro_complete
    repeat: 3
    wait: 10s
    expect:
      output: 'contains "OK: Intro complete"'
