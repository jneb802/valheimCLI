name: Praetoris Connect Test
description: Launch Valheim and wait until the client reaches the server world.

game:
  launch: true
  launchTimeout: 180s
  stopAfter: false

settings:
  timeout: 180s
  stopOnFailure: true

tests:
  - name: Wait for Server World
    waitFor:
      state: InWorld
      timeout: 180s
      message: Waiting for Valheim to connect to the Praetoris test server...
