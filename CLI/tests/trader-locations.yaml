name: Trader Location Tests
description: Visit all custom trader locations and verify vendor interaction

game:
  launch: true
  launchTimeout: 120s
  stopAfter: false

settings:
  timeout: 60s
  stopOnFailure: false

variables:
  world_name: "tradertest"
  n: "1"

tests:
  # --- World Setup ---
  - name: Wait for Main Menu
    waitFor:
      state: MainMenu
      timeout: 120s
      message: Waiting for game to reach main menu...

  - name: Create Test World
    commands:
      - world_create ${world_name}${n}
    wait: 2s

  - name: Start World
    commands:
      - world_start ${world_name}${n}
    wait: 2s

  - name: Wait for World Generation
    waitFor:
      state: InWorld
      timeout: 600s
      message: Waiting for world generation and player spawn...

  - name: Enable Dev Commands
    commands:
      - devcommands
    wait: 500ms

  - name: Enable God Mode
    commands:
      - god
    wait: 500ms

  # --- Location 1: MWL_PlainsTavern1 ---
  - name: "Goto MWL_PlainsTavern1"
    commands:
      - cli_goto_location MWL_PlainsTavern1
    expect:
      output: contains "OK"
    wait: 5s

  - name: "Interact MWL_PlainsTavern1 Vendor"
    commands:
      - cli_interact_nearest 30
    expect:
      output: contains "OK"
    wait: 2s

  - name: "Close Store - PlainsTavern1"
    commands:
      - cli_close_store
    expect:
      output: contains "OK"
    wait: 1s

  # --- Location 2: MWL_PlainsCamp1 ---
